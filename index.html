<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대중제 골프장 매출 현황 분석</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f7f7f5;color:#1a1a1a;}
.wrap{max-width:1200px;margin:0 auto;padding:32px 28px;}

/* 헤더 */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:32px;padding-bottom:24px;border-bottom:1.5px solid #e8e8e4;}
.hdr-left h1{font-size:26px;font-weight:700;color:#111;letter-spacing:-.5px;margin-bottom:6px;}
.hdr-left p{font-size:13px;color:#888;line-height:1.6;}
.hdr select{font-size:14px;padding:8px 14px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#111;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

/* 탭 */
.rtabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.rtab{font-size:13px;padding:7px 20px;border-radius:99px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;}

/* 칩 */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;min-height:0;}
.chip{font-size:12px;padding:5px 14px;border-radius:8px;border:1px solid;background:#fff;cursor:pointer;transition:all .12s;font-family:'Noto Sans KR',sans-serif;}

/* 섹션 라벨 */
.slbl{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#888;margin-bottom:12px;padding-left:2px;}
.slbl.ref{color:#bbb;}

/* KPI 카드 */
.krow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:8px;}
.kpi{background:#fff;border-radius:14px;padding:18px 20px;border:1px solid #ebebeb;border-top:3px solid transparent;}
.kpi .lbl{font-size:12px;color:#999;margin-bottom:8px;font-weight:500;}
.kpi .val{font-size:28px;font-weight:700;color:#111;line-height:1.15;}
.kpi .unit{font-size:15px;font-weight:500;}
.kpi .sub{font-size:12px;margin-top:6px;}
.up{color:#1D9E75;}.dn{color:#D85A30;}.nt{color:#999;}

/* 참고 KPI */
.divider{height:1px;background:#ebebeb;margin:20px 0;}
.rrow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px;}
.rkpi{background:#fff;border-radius:12px;padding:16px 20px;border:1px solid #ebebeb;border-top:2px solid transparent;}
.rkpi .lbl{font-size:12px;color:#bbb;margin-bottom:6px;font-weight:500;}
.rkpi .val{font-size:20px;font-weight:600;color:#888;}
.rkpi .sub{font-size:12px;margin-top:4px;}

/* 차트 카드 */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.card{background:#fff;border:1px solid #ebebeb;border-radius:16px;padding:24px;}
.card-h{font-size:13px;font-weight:700;color:#555;margin-bottom:16px;letter-spacing:.02em;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.bdg{font-size:11px;padding:3px 9px;border-radius:99px;background:#EBF4FF;color:#1a6fcc;font-weight:600;text-transform:none;letter-spacing:0;}
.bdg.ref{background:#f3f3f3;color:#999;}
.leg{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;}
.li{display:flex;align-items:center;gap:5px;font-size:12px;color:#888;}
.ld{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

/* 테이블 */
.tcard{background:#fff;border:1px solid #ebebeb;border-radius:16px;padding:24px;margin-top:4px;}
.tcard-h{font-size:15px;font-weight:700;color:#111;margin-bottom:4px;}
.tw{overflow-x:auto;margin-top:16px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-weight:700;color:#999;font-size:11px;padding:8px 12px;border-bottom:1.5px solid #f0f0f0;white-space:nowrap;text-transform:uppercase;letter-spacing:.05em;}
td{padding:10px 12px;border-bottom:1px solid #f5f5f3;color:#222;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafafa;}
.bw{display:flex;align-items:center;gap:8px;}
.bb{background:#f0f0f0;border-radius:3px;height:6px;width:80px;flex-shrink:0;}
.bf{height:6px;border-radius:3px;}
.avr td{background:#f9f9f7!important;font-weight:700;}
.tn{font-size:12px;color:#bbb;margin-top:10px;}

/* 구분선 */
.section-div{height:1px;background:#ebebeb;margin:28px 0;}

@media(max-width:900px){.krow,.rrow{grid-template-columns:repeat(2,1fr);}.cgrid{grid-template-columns:1fr;}}
@media(max-width:560px){.krow,.rrow{grid-template-columns:1fr;}.wrap{padding:20px 16px;}.hdr-left h1{font-size:20px;}}
</style>
</head>

function sorted(rg,y){
  const lst=rg?[...DB[rg]]:[...DB.수도권,...DB.강원권,...DB.경북권,...DB.경남권];
  return lst.filter(c=>c.ph[y]!=null).sort((a,b)=>(b.ph[y]||0)-(a.ph[y]||0));
}

let aR=null,aC=null,CH={};
const gY=()=>parseInt(document.getElementById('ySel').value);
const pct=(a,b)=>(a!=null&&b!=null&&b>0)?((a-b)/b*100).toFixed(1):null;
const fD=(v)=>{if(v==null)return'';const f=parseFloat(v);return`<span class="${f>=0?'up':'dn'}">${f>=0?'▲+':'▼'}${Math.abs(f)}%</span>`;};

function render(){const y=gY();renderTabs();renderChips(y);if(aC)renderClub(y);else renderRegion(y);}

function renderTabs(){
  document.getElementById('rtabs').innerHTML=
    `<button class="rtab${!aR?' on':''}" style="${!aR?'background:#333;border-color:#333;color:#fff;font-weight:600':''}" onclick="setR(null)">전체</button>`+
    RG.map(r=>{const on=r===aR,c=CL[r];
      return`<button class="rtab${on?' on':''}" style="${on?`background:${c};border-color:${c};color:#fff;font-weight:600`:`color:${c};border-color:${c}55`}" onclick="setR('${r}')">${r}</button>`;
    }).join('');
}
function setR(r){aR=r;aC=null;render();}

function renderChips(y){
  const el=document.getElementById('chips');
  if(!aR){el.innerHTML='';return;}
  const col=CL[aR];
  el.innerHTML=sorted(aR,y).slice(0,10).map((c,i)=>{
    const on=aC&&aC.name===c.name;
    return`<button class="chip" style="${on?`background:${col};border-color:${col};color:#fff;font-weight:600`:`border-color:${col}55;color:${col};background:${col}0d`}" onclick="setC('${aR}','${c.name.replace(/'/g,"\\'")}')">
      ${i+1}위 ${c.name}</button>`;
  }).join('');
}
function setC(r,n){aC=DB[r].find(c=>c.name===n);render();}

function renderRegion(y){
  const py=y-1,regs=aR?[aR]:RG;
  document.getElementById('kLbl').textContent=aR?`📊 핵심 지표 — ${aR} (${y}년)`:`📊 핵심 지표 — 4개 권역 (${y}년)`;
  const ke=document.getElementById('kRow');
  ke.style.gridTemplateColumns=`repeat(${Math.min(regs.length,4)},1fr)`;
  ke.innerHTML=regs.map(r=>{
    const v=ST[r].ph[y]||0,vp=ST[r].ph[py]||0,rv=ST[r].rev[y]||0,d=pct(v,vp);
    return`<div class="kpi" style="border-top-color:${CL[r]}">
      <div class="lbl">${r} 홀당 매출</div>
      <div class="val">${v.toLocaleString()}<span class="unit"> 백만</span></div>
      <div class="sub">${fD(d)}<span class="nt"> 평균 ${rv.toFixed(0)}억</span></div>
    </div>`;
  }).join('');
  const re=document.getElementById('rRow');
  re.style.gridTemplateColumns=`repeat(${Math.min(regs.length,4)},1fr)`;
  re.innerHTML=regs.map(r=>{
    const oi=ST[r].oi[y]||0,ni=ST[r].ni[y]||0;
    return`<div class="rkpi" style="border-top-color:${CL[r]}66">
      <div class="lbl">${r}</div>
      <div class="val">${oi.toFixed(1)}<span style="font-size:12px;font-weight:400">억</span></div>
      <div class="sub nt">영업이익 ${fD(pct(oi,ST[r].oi[py]))}</div>
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0">
        <div class="val">${ni.toFixed(1)}<span style="font-size:12px;font-weight:400">억</span></div>
        <div class="sub nt">당기순이익 ${fD(pct(ni,ST[r].ni[py]))}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('ch1').innerHTML='매출액 추이 <span class="bdg">핵심</span>';
  document.getElementById('ch2').innerHTML='홀당 매출액 추이 <span class="bdg">핵심</span>';
  const mk=(id,m,cb,li)=>mkChart(id,regs.map(r=>({label:r,data:YR.map(y=>ST[r][m][y]||0),borderColor:CL[r],backgroundColor:CL[r]+'22',fill:false,tension:.35,pointRadius:4,pointHoverRadius:6})),cb,li,regs.map(r=>CL[r]));
  mk('c1','rev',v=>v.toFixed(0)+'억','l1');
  mk('c2','ph',v=>v.toLocaleString()+'백만','l2');
  mk('c3','oi',v=>v.toFixed(0)+'억','l3');
  mk('c4','ni',v=>v.toFixed(0)+'억','l4');
  renderTable(y);
}

    const ds=[
      {label:c.name,data:YR.map(y=>c[m][y]??null),borderColor:col,backgroundColor:col+'22',fill:false,tension:.35,pointRadius:4,pointHoverRadius:6,spanGaps:true},
      {label:`${c.r} 평균`,data:YR.map(y=>ST[c.r][m][y]??0),borderColor:'#ccc',backgroundColor:'transparent',fill:false,tension:.35,pointRadius:3,borderDash:[5,4],spanGaps:true},
    ];
    mkChart(id,ds,cb,li,[col,'#ccc']);
  };
  mkC('c1','rev',v=>v!=null?v.toFixed(1)+'억':'-','l1');
  mkC('c2','ph',v=>v!=null?v.toLocaleString()+'백만':'-','l2');
  mkC('c3','oi',v=>v!=null?v.toFixed(1)+'억':'-','l3');
  mkC('c4','ni',v=>v!=null?v.toFixed(1)+'억':'-','l4');
  renderTable(y);
}

function mkChart(id,ds,cb,li,cols){
  const ctx=document.getElementById(id).getContext('2d');
  if(CH[id])CH[id].destroy();
  CH[id]=new Chart(ctx,{type:'line',data:{labels:YR.map(y=>y+'년'),datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:d=>`${d.dataset.label}: ${cb(d.raw)}`}}},scales:{y:{min:0,beginAtZero:true,ticks:{callback:v=>cb(v),font:{size:11}},grid:{color:'rgba(0,0,0,0.05)'}},x:{ticks:{font:{size:11}},grid:{color:'rgba(0,0,0,0.05)'}}}}});
  document.getElementById(li).innerHTML=ds.map((d,i)=>`<div class="li"><div class="ld" style="background:${cols[i]||'#888'}"></div>${d.label}</div>`).join('');
}

function renderTable(y){
  let clubs,title,note='';
  if(aC){clubs=sorted(aR,y).slice(0,10);title=`${aR} 홀당 매출 TOP 10 (${y}년 기준)`;note=`* ${aC.name} 강조 표시`;}
  else if(aR){clubs=sorted(aR,y);title=`${aR} 골프장 홀당 매출 순위 (${y}년 · ${clubs.length}개소)`;}
  else{clubs=sorted(null,y).slice(0,30);title=`전체 골프장 홀당 매출 TOP 30 (${y}년 기준)`;note='* 4개 권역 전체 기준 TOP 30';}
  document.getElementById('tTit').textContent=title;
  document.getElementById('tN').textContent=note;
  document.getElementById('tH').innerHTML=`<th>#</th><th>골프장명</th><th>권역</th><th>홀수</th><th>매출액</th><th>홀당 매출</th><th>영업이익</th><th>당기순이익</th>`;
  const mx=Math.max(...clubs.map(c=>c.ph[y]||0));
  const avg=Math.round(clubs.reduce((s,c)=>s+(c.ph[y]||0),0)/clubs.length);
  document.getElementById('tB').innerHTML=clubs.map((c,i)=>{
    const pv=c.ph[y]||0,pt=(pv/mx*100).toFixed(0),ab=pv>=avg,col=CL[c.r];
    const sel=aC&&aC.name===c.name;
    return`<tr style="${sel?`background:${col}0d`:''}">
      <td style="color:#bbb;font-size:12px">${i+1}</td>
      <td style="font-weight:${sel?700:500}">${c.name}</td>
      <td><span style="font-size:11px;padding:3px 8px;border-radius:99px;background:${col}18;color:${col};font-weight:600">${c.r}</span></td>
      <td style="text-align:center;color:#999">${c.h}홀</td>
      <td style="color:#999">${c.rev[y]!=null?c.rev[y].toFixed(1)+'억':'-'}</td>
      <td><div class="bw">
        <div class="bb"><div class="bf" style="width:${pt}%;background:${ab?col:'#ddd'}"></div></div>
        <span style="min-width:60px;font-weight:${ab?700:400};color:${ab?col:'#555'}">${pv.toLocaleString()}백만</span>
      </div></td>
      <td style="color:#999">${c.oi[y]!=null?c.oi[y].toFixed(1)+'억':'-'}</td>
      <td style="color:#999">${c.ni[y]!=null?c.ni[y].toFixed(1)+'억':'-'}</td>
    </tr>`;
  }).join('')+`<tr class="avr">
    <td colspan="5" style="color:#777">📌 ${aR||'전체'} 평균 (${y}년)</td>
    <td><div class="bw">
      <div class="bb"><div class="bf" style="width:${(avg/mx*100).toFixed(0)}%;background:#999"></div></div>
      <span style="min-width:60px">${avg.toLocaleString()}백만</span>
    </div></td>
    <td colspan="2"></td>
  </tr>`;
}

render();
</script>
</body>
</html>
