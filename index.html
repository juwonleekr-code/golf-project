<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대중제 골프장 매출 현황 분석</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f7f7f5;color:#1a1a1a;}
.wrap{max-width:1200px;margin:0 auto;padding:32px 28px;}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;color:#888;}
.loading-spinner{width:40px;height:40px;border:3px solid #eee;border-top-color:#378ADD;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-box{background:#fff;border:1px solid #f5c1c1;border-radius:12px;padding:24px;color:#c44;text-align:center;max-width:500px;margin:40px auto;}
.error-box h3{margin-bottom:8px;font-size:16px;}
.error-box p{font-size:13px;color:#888;line-height:1.6;}

.hdr{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:32px;padding-bottom:24px;border-bottom:1.5px solid #e8e8e4;}
.hdr-left h1{font-size:26px;font-weight:700;color:#111;letter-spacing:-.5px;margin-bottom:6px;}
.hdr-left p{font-size:13px;color:#888;line-height:1.6;}
.hdr select{font-size:14px;padding:8px 14px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#111;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

.rtabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.rtab{font-size:13px;padding:7px 20px;border-radius:99px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;}

.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;min-height:0;}
.chip{font-size:12px;padding:5px 14px;border-radius:8px;border:1px solid;background:#fff;cursor:pointer;transition:all .12s;font-family:'Noto Sans KR',sans-serif;}

.slbl{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#888;margin-bottom:12px;padding-left:2px;}
.slbl.ref{color:#bbb;}

.krow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:8px;}
.kpi{background:#fff;border-radius:14px;padding:18px 20px;border:1px solid #ebebeb;border-top:3px solid transparent;}
.kpi .lbl{font-size:12px;color:#999;margin-bottom:8px;font-weight:500;}
.kpi .val{font-size:28px;font-weight:700;color:#111;line-height:1.15;}
.kpi .unit{font-size:15px;font-weight:500;}
.kpi .sub{font-size:12px;margin-top:6px;}
.up{color:#1D9E75;}.dn{color:#D85A30;}.nt{color:#999;}

.divider{height:1px;background:#ebebeb;margin:20px 0;}
.rrow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px;}
.rkpi{background:#fff;border-radius:12px;padding:16px 20px;border:1px solid #ebebeb;border-top:2px solid transparent;}
.rkpi .lbl{font-size:11px;color:#bbb;margin-bottom:6px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rkpi .val{font-size:19px;font-weight:600;color:#888;}
.rkpi .sub{font-size:11px;margin-top:4px;}

.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.card{background:#fff;border:1px solid #ebebeb;border-radius:16px;padding:24px;}
.card-h{font-size:13px;font-weight:700;color:#555;margin-bottom:16px;letter-spacing:.02em;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.bdg{font-size:11px;padding:3px 9px;border-radius:99px;background:#EBF4FF;color:#1a6fcc;font-weight:600;text-transform:none;letter-spacing:0;}
.bdg.ref{background:#f3f3f3;color:#999;}
.leg{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;}
.li{display:flex;align-items:center;gap:5px;font-size:12px;color:#888;}
.ld{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

.tcard{background:#fff;border:1px solid #ebebeb;border-radius:16px;padding:24px;margin-top:4px;}
.tcard-h{font-size:15px;font-weight:700;color:#111;margin-bottom:4px;}
.tw{overflow-x:auto;margin-top:8px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-weight:700;color:#999;font-size:11px;padding:8px 12px;border-bottom:1.5px solid #f0f0f0;white-space:nowrap;text-transform:uppercase;letter-spacing:.05em;}
td{padding:10px 12px;border-bottom:1px solid #f5f5f3;color:#222;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafafa;}
.bw{display:flex;align-items:center;gap:8px;}
.bb{background:#f0f0f0;border-radius:3px;height:6px;width:80px;flex-shrink:0;}
.bf{height:6px;border-radius:3px;}
.avr td{background:#f9f9f7!important;font-weight:700;}
.tn{font-size:12px;color:#bbb;margin-top:10px;}

.section-div{height:1px;background:#ebebeb;margin:28px 0;}

.filter-bar{display:flex;flex-wrap:wrap;gap:16px 24px;margin:16px 0 20px;padding:14px 16px;background:#fafaf8;border-radius:12px;}
.filter-group{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.filter-label{font-size:11px;color:#888;font-weight:700;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;}
.filter-btns{display:flex;gap:6px;flex-wrap:wrap;}

.rtab,.chip,.sbtn,.fbtn,#ySel{-webkit-tap-highlight-color:transparent;transition:transform .1s ease, background-color .15s, border-color .15s, opacity .12s;}
.rtab:active,.chip:active,.sbtn:active,.fbtn:active{transform:scale(0.94);opacity:0.85;}
button{cursor:pointer;}
@media(hover:none){
  .rtab:active,.chip:active,.sbtn:active,.fbtn:active{transform:scale(0.92);filter:brightness(0.92);}
}

@media(max-width:900px){.krow,.rrow{grid-template-columns:repeat(2,1fr);}.cgrid{grid-template-columns:1fr;}}

@media(max-width:768px){
  .wrap{padding:18px 14px;}
  .hdr{padding-bottom:18px;margin-bottom:22px;gap:12px;}
  .hdr-left h1{font-size:19px;line-height:1.3;}
  .hdr-left p{font-size:12px;line-height:1.5;}
  .hdr select{font-size:13px;padding:7px 12px;}
  .rtabs{gap:6px;}
  .rtab{font-size:12px;padding:6px 14px;}
  .chips{gap:6px;}
  .chip{font-size:11px;padding:5px 11px;}
  .slbl{font-size:11px;}
  .kpi{padding:14px 16px;border-radius:12px;}
  .kpi .lbl{font-size:11px;}
  .kpi .val{font-size:22px;}
  .kpi .unit{font-size:13px;}
  .rkpi{padding:12px 14px;}
  .rkpi .lbl{font-size:10px;}
  .rkpi .val{font-size:16px;}
  .card{padding:18px 16px;border-radius:14px;}
  .card-h{font-size:12px;margin-bottom:14px;}
  .tcard{padding:18px 14px;border-radius:14px;}
  .tcard-h{font-size:14px;}
  .filter-bar{padding:12px 14px;gap:12px 16px;flex-direction:column;align-items:stretch;}
  .filter-group{align-items:flex-start;}
  .filter-label{font-size:10px;width:100%;margin-bottom:2px;}
  table{font-size:12px;}
  th{font-size:10px;padding:6px 8px;}
  td{padding:8px;font-size:12px;}
  .bb{width:50px;}
}

@media(max-width:560px){
  .krow,.rrow{grid-template-columns:1fr;gap:10px;}
  .wrap{padding:14px 12px;}
  .hdr-left h1{font-size:17px;}
  .kpi .val{font-size:24px;}
  .filter-btns{gap:5px;}
  .sbtn,.fbtn{font-size:11px!important;padding:6px 11px!important;}
}

.ftr{margin-top:32px;padding:20px 0;border-top:1px solid #ebebeb;}
.ftr-content{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.ftr-left{display:flex;align-items:center;gap:10px;}
.ftr-label{font-size:11px;color:#bbb;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.ftr-creator{font-size:13px;color:#666;font-weight:500;}
.contact-btn{display:flex;align-items:center;gap:6px;font-size:12px;padding:8px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#555;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:all .15s;}
.contact-btn:hover{border-color:#888;color:#222;}
.contact-btn:active{transform:scale(0.96);}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(20,20,20,.55);z-index:1000;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);}
.modal-bg.show{display:flex;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:20px;padding:32px 24px 28px;max-width:340px;width:100%;text-align:center;position:relative;box-shadow:0 20px 50px rgba(0,0,0,.15);animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:8px;border:none;background:transparent;font-size:22px;color:#bbb;cursor:pointer;line-height:1;}
.modal-close:hover{background:#f5f5f3;color:#666;}
.profile-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#378ADD,#1D9E75);color:#fff;font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.profile-name{font-size:20px;font-weight:700;color:#111;margin-bottom:4px;}
.profile-title{font-size:13px;color:#888;margin-bottom:18px;}
.contact-info{margin:6px 0 18px;display:flex;flex-direction:column;gap:8px;}
.contact-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fafaf8;border-radius:10px;text-decoration:none;color:#333;font-size:13px;font-family:'Noto Sans KR',sans-serif;border:none;cursor:pointer;width:100%;text-align:left;transition:all .12s;-webkit-tap-highlight-color:transparent;}
.contact-row:hover{background:#f3f3f0;}
.contact-row:active{transform:scale(0.98);}
.contact-row .icon{width:18px;height:18px;color:#888;flex-shrink:0;}
.contact-row .label{flex:1;color:#555;word-break:break-all;}
.contact-row .copy-hint{font-size:10px;color:#bbb;flex-shrink:0;}
.profile-divider{height:1px;background:#f0f0f0;margin-bottom:16px;}
.contact-action{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 16px;border-radius:10px;font-size:13px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;border:1px solid #e5e5e5;background:#fff;color:#333;text-decoration:none;margin-bottom:8px;transition:all .15s;}
.contact-action:hover{background:#fafaf8;}
.contact-action:active{transform:scale(0.98);}
.contact-action.primary{background:#111;color:#fff;border-color:#111;}
.contact-action.primary:hover{background:#000;}
.contact-note{font-size:11px;color:#888;margin-top:14px;line-height:1.7;text-align:left;background:#f9f9f7;padding:10px 12px;border-radius:8px;}
.contact-note strong{color:#444;font-weight:600;}

@media(max-width:560px){
  .modal{padding:28px 20px 24px;border-radius:18px;}
  .ftr-content{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>

<div id="loadingScreen" class="wrap">
  <div class="loading">
    <div class="loading-spinner"></div>
    <div>데이터 불러오는 중...</div>
  </div>
</div>

<div id="errorScreen" class="wrap" style="display:none;">
  <div class="error-box">
    <h3>⚠️ 데이터를 불러올 수 없습니다</h3>
    <p id="errorMsg">data.json 파일을 확인해 주세요.</p>
  </div>
</div>

<div id="mainDash" class="wrap" style="display:none;">

<div class="hdr">
  <div class="hdr-left">
    <h1 id="hdrTitle">⛳ </h1>
    <p id="hdrSubtitle"></p>
  </div>
  <select id="ySel" onchange="render()"></select>
</div>

<div class="rtabs" id="rtabs"></div>
<div class="chips" id="chips"></div>

<div class="slbl" id="kLbl">📊 핵심 지표</div>
<div class="krow" id="kRow"></div>

<div class="divider"></div>

<div class="slbl ref">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:5px;margin-bottom:1px;"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>참고 지표 — 영업이익 · 당기순이익 (개소 평균)
</div>
<div class="rrow" id="rRow"></div>

<div class="section-div"></div>

<div class="cgrid">
  <div class="card">
    <div class="card-h" id="ch1">매출액 추이 <span class="bdg">핵심</span></div>
    <div style="position:relative;height:220px"><canvas id="c1" role="img" aria-label="매출액 추이"></canvas></div>
    <div class="leg" id="l1"></div>
  </div>
  <div class="card">
    <div class="card-h" id="ch2">홀당 매출액 추이 <span class="bdg">핵심</span></div>
    <div style="position:relative;height:220px"><canvas id="c2" role="img" aria-label="홀당 매출액 추이"></canvas></div>
    <div class="leg" id="l2"></div>
  </div>
</div>

<div class="cgrid">
  <div class="card">
    <div class="card-h">영업이익 추이 <span class="bdg ref">참고</span></div>
    <div style="position:relative;height:180px"><canvas id="c3" role="img" aria-label="영업이익 추이"></canvas></div>
    <div class="leg" id="l3"></div>
  </div>
  <div class="card">
    <div class="card-h">당기순이익 추이 <span class="bdg ref">참고</span></div>
    <div style="position:relative;height:180px"><canvas id="c4" role="img" aria-label="당기순이익 추이"></canvas></div>
    <div class="leg" id="l4"></div>
  </div>
</div>

<div class="tcard">
  <div class="tcard-h" id="tTit">홀당 매출 순위</div>
  <div class="filter-bar">
    <div class="filter-group">
      <span class="filter-label">정렬 기준</span>
      <div id="sortBtns" class="filter-btns"></div>
    </div>
    <div class="filter-group">
      <span class="filter-label">홀수 필터</span>
      <div id="holeBtns" class="filter-btns"></div>
    </div>
  </div>
  <div class="tw"><table><thead><tr id="tH"></tr></thead><tbody id="tB"></tbody></table></div>
  <div class="tn" id="tN"></div>
</div>

<footer class="ftr">
  <div class="ftr-content">
    <div class="ftr-left">
      <div class="ftr-label">제작</div>
      <div class="ftr-creator" id="ftrCreator"></div>
    </div>
    <button class="contact-btn" onclick="openContact()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      <span>명함 보기</span>
    </button>
  </div>
</footer>

</div>

<div id="contactModal" class="modal-bg" onclick="if(event.target===this)closeContact()">
  <div class="modal">
    <button class="modal-close" onclick="closeContact()" aria-label="닫기">×</button>
    <div class="profile-avatar" id="profileAvatar">이</div>
    <div class="profile-name" id="profileName">이주원</div>
    <div class="profile-title" id="profileTitle">바로자산운용 상무</div>
    
    <div class="contact-info" id="contactInfo"></div>
    
    <div class="profile-divider"></div>
    <a class="contact-action primary" id="rememberLink" target="_blank" rel="noopener">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="M2 8h20"></path><circle cx="8" cy="14" r="2"></circle><path d="M14 12h4M14 16h4"></path></svg>
      <span>리멤버 명함 보기 / 저장</span>
    </a>
    <button class="contact-action" onclick="downloadVCard()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
      <span>연락처 다운로드 (.vcf)</span>
    </button>
    <p class="contact-note">다운로드한 파일에서 각 항목을 <strong>길게 누르면</strong> → "새 연락처 만들기" 저장 가능</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let META = {}, ST = {}, DB = {};
let RG = [], YR = [], CL = {};
let aR = null, aC = null, CH = {}, sortBy = 'ph', holeFilter = 'all';

const SORT_LABELS = {ph:'홀당 매출', rev:'매출액', oi:'영업이익', ni:'당기순이익'};
const SORT_UNITS = {ph:'백만', rev:'억', oi:'억', ni:'억'};

async function loadData() {
  try {
    const res = await fetch('data.json?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    META = data.meta;
    RG = META.regions; YR = META.years; CL = META.regionColors;
    
    ST = {};
    for (const r of RG) {
      ST[r] = {rev:{}, ph:{}, oi:{}, ni:{}};
      for (const y of YR) {
        const ys = String(y);
        if (data.stats[r] && data.stats[r][ys]) {
          ST[r].rev[y] = data.stats[r][ys].rev;
          ST[r].ph[y] = data.stats[r][ys].ph;
          ST[r].oi[y] = data.stats[r][ys].oi;
          ST[r].ni[y] = data.stats[r][ys].ni;
        }
      }
    }
    
    DB = {};
    for (const r of RG) {
      DB[r] = (data.clubs[r] || []).map(c => {
        const conv = (obj) => { const out = {}; for (const k in obj) out[parseInt(k)] = obj[k]; return out; };
        return {name: c.name, h: c.h, r: c.r, rev: conv(c.rev), ph: conv(c.ph), oi: conv(c.oi), ni: conv(c.ni)};
      });
    }
    
    initUI();
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainDash').style.display = '';
    render();
  } catch (e) {
    console.error('Data load failed:', e);
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('errorScreen').style.display = '';
    document.getElementById('errorMsg').textContent = 'data.json 파일을 확인해 주세요. (' + e.message + ')';
  }
}

function initUI() {
  document.getElementById('hdrTitle').textContent = '⛳ ' + META.title;
  document.getElementById('hdrSubtitle').textContent = META.subtitle;
  const ySel = document.getElementById('ySel');
  ySel.innerHTML = YR.slice().reverse().map(y => 
    `<option value="${y}"${y === META.defaultYear ? ' selected' : ''}>${y}년</option>`
  ).join('');
  document.getElementById('ftrCreator').textContent = META.creator;
  if (META.creator) {
    const parts = META.creator.split('·').map(s => s.trim());
    if (parts.length >= 2) {
      const company = parts[0];
      const personPart = parts[1].split(' ');
      const name = personPart[0] || '';
      const title = personPart.slice(1).join(' ') || '';
      document.getElementById('profileName').textContent = name;
      document.getElementById('profileTitle').textContent = company + (title ? ' ' + title : '');
      document.getElementById('profileAvatar').textContent = name.charAt(0);
    }
  }
  document.getElementById('rememberLink').href = META.rememberLink || '#';
  
  // 연락처 정보 렌더링
  const contactEl = document.getElementById('contactInfo');
  if (META.contact) {
    const c = META.contact;
    let html = '';
    if (c.phone) {
      html += `<a class="contact-row" href="tel:${c.phone}" onclick="buzz()">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        <span class="label">${c.phone}</span>
        <span class="copy-hint">탭하여 통화</span>
      </a>`;
    }
    if (c.emails && c.emails.length) {
      c.emails.forEach(em => {
        html += `<a class="contact-row" href="mailto:${em}" onclick="buzz()">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
          <span class="label">${em}</span>
          <span class="copy-hint">메일</span>
        </a>`;
      });
    }
    if (c.instagram) {
      html += `<a class="contact-row" href="${c.instagram}" target="_blank" rel="noopener" onclick="buzz()">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
        <span class="label">인스타그램</span>
        <span class="copy-hint">열기 ↗</span>
      </a>`;
    }
    contactEl.innerHTML = html;
  } else {
    contactEl.style.display = 'none';
  }
}

const gY = () => parseInt(document.getElementById('ySel').value);
const pct = (a, b) => (a != null && b != null && b > 0) ? ((a - b) / b * 100).toFixed(1) : null;
const fD = (v) => { if (v == null) return ''; const f = parseFloat(v); return `<span class="${f >= 0 ? 'up' : 'dn'}">${f >= 0 ? '▲+' : '▼'}${Math.abs(f)}%</span>`; };
const buzz = () => { try { if ('vibrate' in navigator) navigator.vibrate(15); } catch(e){} };

function sorted(rg, y, metric) {
  const m = metric || sortBy;
  let lst = rg ? [...DB[rg]] : RG.flatMap(r => DB[r] || []);
  if (holeFilter !== 'all') {
    lst = lst.filter(c => {
      if (holeFilter === '18') return c.h === 18;
      if (holeFilter === '27') return c.h === 27;
      if (holeFilter === '36+') return c.h >= 36;
      return true;
    });
  }
  return lst.filter(c => c[m][y] != null).sort((a, b) => (b[m][y] || 0) - (a[m][y] || 0));
}

function setSort(m) { sortBy = m; buzz(); render(); }
function setHoleFilter(f) { holeFilter = f; buzz(); render(); }
function setR(r) { buzz(); aR = r; aC = null; render(); }
function setC(r, n) { buzz(); aC = DB[r].find(c => c.name === n); render(); }

function render() {
  const y = gY();
  renderTabs(); renderSortBtns(); renderHoleBtns(); renderChips(y);
  if (aC) renderClub(y); else renderRegion(y);
}

function renderTabs() {
  document.getElementById('rtabs').innerHTML =
    `<button class="rtab" style="${!aR?'background:#333;border-color:#333;color:#fff;font-weight:600':''}" onclick="setR(null)">전체</button>` +
    RG.map(r => { const on = r === aR, c = CL[r];
      return `<button class="rtab" style="${on?`background:${c};border-color:${c};color:#fff;font-weight:600`:`color:${c};border-color:${c}55`}" onclick="setR('${r}')">${r}</button>`;
    }).join('');
}

function renderSortBtns() {
  const btns = [['ph','홀당 매출'],['rev','매출액'],['oi','영업이익'],['ni','당기순이익']];
  document.getElementById('sortBtns').innerHTML = btns.map(([k, lbl]) => {
    const on = sortBy === k;
    return `<button class="sbtn" style="font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid ${on?'#333':'#ddd'};background:${on?'#333':'#fff'};color:${on?'#fff':'#666'};cursor:pointer;font-weight:${on?600:500};font-family:'Noto Sans KR',sans-serif;" onclick="setSort('${k}')">${lbl}</button>`;
  }).join('');
}

function renderHoleBtns() {
  const btns = [['all','전체'],['18','18홀'],['27','27홀'],['36+','36홀+']];
  document.getElementById('holeBtns').innerHTML = btns.map(([k, lbl]) => {
    const on = holeFilter === k;
    return `<button class="fbtn" style="font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid ${on?'#333':'#ddd'};background:${on?'#333':'#fff'};color:${on?'#fff':'#666'};cursor:pointer;font-weight:${on?600:500};font-family:'Noto Sans KR',sans-serif;" onclick="setHoleFilter('${k}')">${lbl}</button>`;
  }).join('');
}

function renderChips(y) {
  const el = document.getElementById('chips');
  if (!aR) { el.innerHTML = ''; return; }
  const col = CL[aR];
  el.innerHTML = sorted(aR, y).slice(0, 10).map((c, i) => {
    const on = aC && aC.name === c.name;
    return `<button class="chip" style="${on?`background:${col};border-color:${col};color:#fff;font-weight:600`:`border-color:${col}55;color:${col};background:${col}0d`}" onclick="setC('${aR}','${c.name.replace(/'/g,"\\'")}')">${i+1}위 ${c.name}</button>`;
  }).join('');
}

function renderRegion(y) {
  const baseY = META.baselineYear || 2020;
  const regs = aR ? [aR] : RG;
  const isBase = y === baseY;
  document.getElementById('kLbl').textContent = aR ? `📊 핵심 지표 — ${aR} (${y}년)` : `📊 핵심 지표 — 4개 권역 (${y}년)`;
  
  const ke = document.getElementById('kRow');
  ke.style.gridTemplateColumns = `repeat(${Math.min(regs.length, 4)}, 1fr)`;
  ke.innerHTML = regs.map(r => {
    const v = ST[r].ph[y] || 0, vb = ST[r].ph[baseY] || 0, d = isBase ? null : pct(v, vb);
    return `<div class="kpi" style="border-top-color:${CL[r]}">
      <div class="lbl">${r} 홀당 매출</div>
      <div class="val">${v.toLocaleString()}<span class="unit"> 백만</span></div>
      <div class="sub">${isBase?'<span class="nt">기준연도</span>':fD(d)+`<span class="nt"> vs ${baseY}</span>`}</div>
    </div>`;
  }).join('');
  
  const re = document.getElementById('rRow');
  re.style.gridTemplateColumns = `repeat(${Math.min(regs.length, 4)}, 1fr)`;
  re.innerHTML = regs.map(r => {
    const oi = ST[r].oi[y] || 0, ni = ST[r].ni[y] || 0;
    const oid = isBase ? null : pct(oi, ST[r].oi[baseY]);
    const nid = isBase ? null : pct(ni, ST[r].ni[baseY]);
    return `<div class="rkpi" style="border-top-color:${CL[r]}66">
      <div class="lbl">${r}</div>
      <div class="val">${oi.toFixed(1)}<span style="font-size:12px;font-weight:400">억</span></div>
      <div class="sub nt">영업이익</div>
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0">
        <div class="val">${ni.toFixed(1)}<span style="font-size:12px;font-weight:400">억</span></div>
        <div class="sub nt">당기순이익</div>
      </div>
    </div>`;
  }).join('');
  
  document.getElementById('ch1').innerHTML = '매출액 추이 <span class="bdg">핵심</span>';
  document.getElementById('ch2').innerHTML = '홀당 매출액 추이 <span class="bdg">핵심</span>';
  
  const mk = (id, m, cb, li) => mkChart(id, regs.map(r => ({
    label: r, data: YR.map(yy => ST[r][m][yy] || 0),
    borderColor: CL[r], backgroundColor: CL[r]+'22',
    fill: false, tension: .35, pointRadius: 4, pointHoverRadius: 6
  })), cb, li, regs.map(r => CL[r]));
  
  mk('c1', 'rev', v => v.toFixed(0)+'억', 'l1');
  mk('c2', 'ph', v => v.toLocaleString()+'백만', 'l2');
  mk('c3', 'oi', v => v.toFixed(0)+'억', 'l3');
  mk('c4', 'ni', v => v.toFixed(0)+'억', 'l4');
  
  renderTable(y);
}

function renderClub(y) {
  const c = aC, col = CL[c.r], baseY = META.baselineYear || 2020;
  const isBase = y === baseY;
  document.getElementById('kLbl').textContent = `📊 ${c.name} — 핵심 지표 (${y}년)`;
  
  const phY = c.ph[y] ?? null, rvY = c.rev[y] ?? null;
  const ke = document.getElementById('kRow');
  ke.style.gridTemplateColumns = 'repeat(2, 1fr)';
  ke.innerHTML = `
    <div class="kpi" style="border-top-color:${col}">
      <div class="lbl">홀당 매출 (${y}년)</div>
      <div class="val">${phY != null ? phY.toLocaleString() : '-'}<span class="unit"> 백만</span></div>
      <div class="sub">${isBase?'<span class="nt">기준연도</span>':fD(pct(phY, c.ph[baseY]))+`<span class="nt"> vs ${baseY}</span>`}</div>
    </div>
    <div class="kpi" style="border-top-color:${col}88">
      <div class="lbl">매출액 (${y}년)</div>
      <div class="val">${rvY != null ? rvY.toFixed(1) : '-'}<span class="unit"> 억</span></div>
      <div class="sub">${isBase?`<span class="nt">${c.h}홀</span>`:fD(pct(rvY, c.rev[baseY]))+`<span class="nt"> vs ${baseY} · ${c.h}홀</span>`}</div>
    </div>`;
  
  const oiY = c.oi[y] ?? null, niY = c.ni[y] ?? null;
  const re = document.getElementById('rRow');
  re.style.gridTemplateColumns = 'repeat(2, 1fr)';
  re.innerHTML = `
    <div class="rkpi" style="border-top-color:${col}55">
      <div class="lbl">영업이익 (${y}년)</div>
      <div class="val">${oiY != null ? oiY.toFixed(1) : '-'}<span style="font-size:12px;font-weight:400">억</span></div>
      <div class="sub nt">영업이익</div>
    </div>
    <div class="rkpi" style="border-top-color:${col}44">
      <div class="lbl">당기순이익 (${y}년)</div>
      <div class="val">${niY != null ? niY.toFixed(1) : '-'}<span style="font-size:12px;font-weight:400">억</span></div>
      <div class="sub nt">당기순이익</div>
    </div>`;
  
  document.getElementById('ch1').innerHTML = `${c.name} 매출액 추이 <span class="bdg">핵심</span>`;
  document.getElementById('ch2').innerHTML = `${c.name} 홀당 매출 추이 <span class="bdg">핵심</span>`;
  
  const mkC = (id, m, cb, li) => {
    const ds = [
      {label: c.name, data: YR.map(yy => c[m][yy] ?? null),
       borderColor: col, backgroundColor: col+'22',
       fill: false, tension: .35, pointRadius: 4, pointHoverRadius: 6, spanGaps: true},
      {label: `${c.r} 평균`, data: YR.map(yy => ST[c.r][m][yy] ?? 0),
       borderColor: '#ccc', backgroundColor: 'transparent',
       fill: false, tension: .35, pointRadius: 3, borderDash: [5,4], spanGaps: true}
    ];
    mkChart(id, ds, cb, li, [col, '#ccc']);
  };
  
  mkC('c1', 'rev', v => v != null ? v.toFixed(1)+'억' : '-', 'l1');
  mkC('c2', 'ph', v => v != null ? v.toLocaleString()+'백만' : '-', 'l2');
  mkC('c3', 'oi', v => v != null ? v.toFixed(1)+'억' : '-', 'l3');
  mkC('c4', 'ni', v => v != null ? v.toFixed(1)+'억' : '-', 'l4');
  
  renderTable(y);
}

function mkChart(id, ds, cb, li, cols) {
  const ctx = document.getElementById(id).getContext('2d');
  if (CH[id]) CH[id].destroy();
  CH[id] = new Chart(ctx, {
    type: 'line',
    data: { labels: YR.map(y => y+'년'), datasets: ds },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: d => `${d.dataset.label}: ${cb(d.raw)}` } } },
      scales: {
        y: { min: 0, beginAtZero: true, ticks: { callback: v => cb(v), font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.05)' } },
        x: { ticks: { font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.05)' } }
      }
    }
  });
  document.getElementById(li).innerHTML = ds.map((d, i) => `<div class="li"><div class="ld" style="background:${cols[i]||'#888'}"></div>${d.label}</div>`).join('');
}

function renderTable(y) {
  let clubs, title, note = '';
  const sortLbl = SORT_LABELS[sortBy];
  const holeLbl = holeFilter === 'all' ? '' : ` · ${holeFilter==='36+'?'36홀+':holeFilter+'홀'}`;
  const allClubs = sorted(aR, y);
  
  if (aC) {
    clubs = sorted(aR, y).slice(0, 10);
    title = `${aR} ${sortLbl} TOP 10 (${y}년${holeLbl})`;
    note = `* ${aC.name} 강조 표시`;
  } else if (aR) {
    clubs = allClubs;
    title = `${aR} 골프장 ${sortLbl} 순위 (${y}년${holeLbl} · ${clubs.length}개소)`;
  } else {
    clubs = allClubs.slice(0, 30);
    title = `전체 골프장 ${sortLbl} TOP 30 (${y}년${holeLbl})`;
    note = `* 4개 권역 전체 ${allClubs.length}개소 중 TOP 30 표시`;
  }
  
  document.getElementById('tTit').textContent = title;
  document.getElementById('tN').textContent = note;
  
  const cols = [['ph','홀당 매출'],['rev','매출액'],['oi','영업이익'],['ni','당기순이익']];
  document.getElementById('tH').innerHTML = `<th>#</th><th>골프장명</th><th>권역</th><th>홀수</th>` + cols.map(([k, lbl]) => {
    const isSort = k === sortBy;
    return `<th style="${isSort?'color:#333;background:#f5f5f3':''}">${lbl}${isSort?' ▼':''}</th>`;
  }).join('');
  
  const sortKey = sortBy, sortUnit = SORT_UNITS[sortBy];
  const mx = Math.max(...clubs.map(c => c[sortKey][y] || 0));
  const avgVals = allClubs.map(c => c[sortKey][y] || 0).filter(v => v > 0);
  const avg = avgVals.length ? (avgVals.reduce((a,b)=>a+b, 0) / avgVals.length) : 0;
  const avgDisp = sortKey === 'ph' ? Math.round(avg).toLocaleString() : avg.toFixed(1);
  const avgScope = aR ? aR : '전체';
  
  document.getElementById('tB').innerHTML = clubs.map((c, i) => {
    const sv = c[sortKey][y] || 0;
    const pt = mx ? (sv/mx*100).toFixed(0) : 0;
    const ab = sv >= avg, col = CL[c.r];
    const sel = aC && aC.name === c.name;
    const fmt = (k, v) => { if (v == null) return '-'; return k === 'ph' ? v.toLocaleString()+'백만' : v.toFixed(1)+'억'; };
    const cellStyle = (k) => k === sortKey ? `background:${col}08` : '';
    return `<tr style="${sel?`background:${col}0d`:''}">
      <td style="color:#bbb;font-size:12px">${i+1}</td>
      <td style="font-weight:${sel?700:500}">${c.name}</td>
      <td><span style="font-size:11px;padding:3px 8px;border-radius:99px;background:${col}18;color:${col};font-weight:600">${c.r}</span></td>
      <td style="text-align:center;color:#999">${c.h}홀</td>
      <td style="${cellStyle('ph')};${sortKey==='ph'?'':'color:#999'}">${sortKey==='ph'?`<div class="bw"><div class="bb"><div class="bf" style="width:${pt}%;background:${ab?col:'#ddd'}"></div></div><span style="min-width:60px;font-weight:${ab?700:400};color:${ab?col:'#555'}">${fmt('ph',c.ph[y])}</span></div>`:fmt('ph',c.ph[y])}</td>
      <td style="${cellStyle('rev')};${sortKey==='rev'?'':'color:#999'}">${sortKey==='rev'?`<div class="bw"><div class="bb"><div class="bf" style="width:${pt}%;background:${ab?col:'#ddd'}"></div></div><span style="min-width:60px;font-weight:${ab?700:400};color:${ab?col:'#555'}">${fmt('rev',c.rev[y])}</span></div>`:fmt('rev',c.rev[y])}</td>
      <td style="${cellStyle('oi')};${sortKey==='oi'?'':'color:#999'}">${sortKey==='oi'&&c.oi[y]!=null?`<div class="bw"><div class="bb"><div class="bf" style="width:${pt}%;background:${ab?col:'#ddd'}"></div></div><span style="min-width:60px;font-weight:${ab?700:400};color:${ab?col:'#555'}">${fmt('oi',c.oi[y])}</span></div>`:fmt('oi',c.oi[y])}</td>
      <td style="${cellStyle('ni')};${sortKey==='ni'?'':'color:#999'}">${sortKey==='ni'&&c.ni[y]!=null?`<div class="bw"><div class="bb"><div class="bf" style="width:${pt}%;background:${ab?col:'#ddd'}"></div></div><span style="min-width:60px;font-weight:${ab?700:400};color:${ab?col:'#555'}">${fmt('ni',c.ni[y])}</span></div>`:fmt('ni',c.ni[y])}</td>
    </tr>`;
  }).join('') + `<tr class="avr">
    <td colspan="4" style="color:#777">📌 ${avgScope} ${avgVals.length}개소 평균 (${y}년 · ${sortLbl}${holeLbl})</td>
    <td colspan="4" style="text-align:left;padding-left:12px;"><div class="bw">
      <div class="bb"><div class="bf" style="width:${mx?(avg/mx*100).toFixed(0):0}%;background:#999"></div></div>
      <span style="min-width:60px;font-weight:700">${avgDisp}${sortUnit}</span>
    </div></td>
  </tr>`;
}

function openContact() { buzz(); document.getElementById('contactModal').classList.add('show'); }

function downloadVCard() {
  buzz();
  const name = document.getElementById('profileName').textContent;
  const titleParts = document.getElementById('profileTitle').textContent.split(' ');
  const org = titleParts[0] || '';
  const title = titleParts.slice(1).join(' ') || '';
  const c = META.contact || {};
  
  // 한글 이름 분리 (성/이름)
  const surname = name.charAt(0);
  const givenName = name.slice(1);
  
  // vCard 3.0 표준 - iOS/Android 모두 지원
  let lines = [];
  lines.push('BEGIN:VCARD');
  lines.push('VERSION:3.0');
  lines.push(`N:${surname};${givenName};;;`);
  lines.push(`FN:${name}`);
  if (org) lines.push(`ORG:${org}`);
  if (title) lines.push(`TITLE:${title}`);
  if (c.phone) {
    // 휴대폰 번호 - 공백/대시 제거 (저장 호환성 향상)
    const phoneClean = c.phone.replace(/[\s-]/g, '');
    lines.push(`TEL;TYPE=CELL,VOICE:${phoneClean}`);
  }
  if (c.emails && c.emails.length) {
    c.emails.forEach((em, i) => {
      const type = i === 0 ? 'WORK' : 'HOME';
      lines.push(`EMAIL;TYPE=INTERNET,${type}:${em}`);
    });
  }
  if (META.rememberLink) lines.push(`URL;TYPE=WORK:${META.rememberLink}`);
  if (c.instagram) lines.push(`URL;TYPE=HOME:${c.instagram}`);
  // 추가 메모: 인스타그램 ID 정보 포함
  if (c.instagram) {
    const igHandle = c.instagram.split('/').pop();
    lines.push(`X-SOCIALPROFILE;type=instagram:${c.instagram}`);
    lines.push(`NOTE:Instagram: @${igHandle}`);
  }
  lines.push('END:VCARD');
  
  // vCard 표준은 CRLF 줄바꿈 필수 (iOS에서 저장 안 되는 이유 #1)
  const vcard = lines.join('\r\n') + '\r\n';
  
  // BOM 추가 (한글 인식 향상)
  const BOM = '\uFEFF';
  const blob = new Blob([BOM + vcard], { type: 'text/vcard;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${name}.vcf`;  // 파일명 단순화 (한글+특수문자 호환성)
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
}
